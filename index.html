<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4FILMS - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.6">
</head>
<body>

    <!-- الهيدر -->
    <header>
        <a href="index.html" class="logo">D4<span>FILMS</span></a>
        <div class="nav-actions">
            <i class="fa-solid fa-magnifying-glass" onclick="window.location.href='search.html'"></i>
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <!-- الـ Hero Slider الديناميكي -->
    <div class="hero-slider-container" id="heroSlider">
        <!-- غايعمر بـ JS بـ الأفلام والمسلسلات الرائجة -->
    </div>

    <main class="main-content">

        <!-- 1️⃣ سيكشن Trending Now (على شكل Slide أفقي فيه 20 حبة) -->
        <div class="section-wrapper">
            <div class="section-header">
                <i class="fa-solid fa-fire section-icon"></i>
                <h2 class="section-title">Trending Now</h2>
            </div>
            <div class="trending-slider-wrapper" id="trendingNowSlider">
                <!-- الـ Skeletons الافتراضية مريحة للعين -->
                <div class="movie-card"><div class="poster-box skeleton"></div></div>
                <div class="movie-card"><div class="poster-box skeleton"></div></div>
                <div class="movie-card"><div class="poster-box skeleton"></div></div>
                <div class="movie-card"><div class="poster-box skeleton"></div></div>
                <div class="movie-card"><div class="poster-box skeleton"></div></div>
            </div>
        </div>

        <!-- 2️⃣ سيكشن Recommended (كمية مهمة على شكل Grid مستف ماشي سلايد) -->
        <div class="section-wrapper">
            <div class="section-header">
                <i class="fa-solid fa-star section-icon"></i>
                <h2 class="section-title">Recommended For You</h2>
            </div>
            <div class="movies-grid" id="recommendedGrid">
                <!-- غايعمر بـ 18 لـ 20 كارت مستفين توب -->
            </div>
        </div>

    </main>

    <footer style="text-align: center; padding: 25px 0; color: var(--text-gray); font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05);">
        <p>&copy; 2026 D4FILMS. All rights reserved.</p>
    </footer>

    <script src="js/script.js?v=1.6"></script>
</body>
</html>
