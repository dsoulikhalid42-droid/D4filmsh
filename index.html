<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4film - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">D4<span>film</span></a>
        <div class="nav-actions">
            <i class="fas fa-search" id="searchIcon"></i>
        </div>
    </header>

    <div class="hero-slider-container" id="heroSlider"></div>

    <main class="main-content">
        <div class="section-wrapper">
            <div class="section-header">
                <i class="fas fa-fire section-icon"></i>
                <h2 class="section-title">Trending Now</h2>
            </div>
            <div class="trending-slider-wrapper" id="trendingContainer"></div>
        </div>

        <div class="section-wrapper">
            <div class="section-header">
                <i class="fas fa-film section-icon"></i>
                <h2 class="section-title">Latest Movies</h2>
            </div>
            <div class="movies-grid" id="moviesGridContainer"></div>
        </div>
    </main>

    <script>
        const TMDB_API_KEY = '8495bc216c52a09f8742880c55455955';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_URL = 'https://image.tmdb.org/t/p/w500';
        const BACKDROP_URL = 'https://image.tmdb.org/t/p/original';

        document.addEventListener('DOMContentLoaded', () => {
            fetchTrending();
            fetchLatestMovies();
        });

        async function fetchTrending() {
            try {
                const res = await fetch(`${BASE_URL}/trending/all/day?api_key=${TMDB_API_KEY}`);
                const data = await res.json();
                const items = data.results || [];
                renderHeroSlider(items.slice(0, 3));
                
                const trendingContainer = document.getElementById('trendingContainer');
                trendingContainer.innerHTML = '';
                items.forEach(item => {
                    const type = item.media_type || 'movie';
                    trendingContainer.appendChild(createCard(item, type));
                });
            } catch (err) { console.error(err); }
        }

        async function fetchLatestMovies() {
            try {
                const res = await fetch(`${BASE_URL}/movie/now_playing?api_key=${TMDB_API_KEY}&page=1`);
                const data = await res.json();
                const container = document.getElementById('moviesGridContainer');
                container.innerHTML = '';
                (data.results || []).forEach(movie => {
                    container.appendChild(createCard(movie, 'movie'));
                });
            } catch (err) { console.error(err); }
        }

        function createCard(item, type) {
            const div = document.createElement('div');
            div.className = 'movie-card';
            const poster = item.poster_path ? `${IMAGE_URL}${item.poster_path}` : 'https://via.placeholder.com/150x220?text=No+Image';
            div.innerHTML = `
                <div class="poster-box" style="background-image: url('${poster}')"><span class="hd-tag">HD</span></div>
                <div class="card-info">
                    <div class="card-meta"><span><i class="fas fa-star" style="color:#ffb703;"></i> ${(item.vote_average || 0).toFixed(1)}</span>•<span>${(item.release_date || item.first_air_date || '----').split('-')[0]}</span></div>
                    <div class="card-title">${item.title || item.name}</div>
                </div>
            `;
            div.onclick = () => { window.location.href = `movie.html?id=${item.id}&type=${type}`; };
            return div;
        }

        function renderHeroSlider(items) {
            const slider = document.getElementById('heroSlider');
            slider.innerHTML = '';
            items.forEach((item, index) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url('${item.backdrop_path ? BACKDROP_URL + item.backdrop_path : ''}')`;
                const type = item.media_type || 'movie';
                slide.innerHTML = `
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <h2 class="hero-title">${item.title || item.name}</h2>
                        <div class="hero-meta"><span class="badge-cyan">${type.toUpperCase()}</span><span><i class="fas fa-star" style="color:#ffb703;"></i> ${(item.vote_average || 0).toFixed(1)}</span></div>
                        <button class="btn-watch" onclick="window.location.href='movie.html?id=${item.id}&type=${type}'"><i class="fas fa-play"></i> Watch Now</button>
                    </div>
                `;
                slider.appendChild(slide);
            });
            let current = 0;
            setInterval(() => {
                const slides = document.querySelectorAll('.hero-slide');
                if(!slides.length) return;
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 5000);
        }
    </script>
</body>
</html>
