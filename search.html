<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Movies - D4FILMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.3">
</head>
<body style="padding-top: 70px;">

    <header>
        <a href="index.html" class="logo">D4<span>FILMS</span></a>
        <div class="nav-actions">
            <i class="fa-solid fa-house" onclick="window.location.href='index.html'"></i>
        </div>
    </header>

    <div class="section-wrapper" style="margin-top: 20px;">
        <div style="position: relative; width: 100%; max-width: 600px; margin: 0 auto;">
            <input type="text" id="searchInput" placeholder="Enter movie title..." style="width: 100%; padding: 14px 20px; background: #1f2833; border: 1.5px solid rgba(255,255,255,0.1); border-radius: 30px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.3s;">
            <i class="fa-solid fa-magnifying-glass" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text-gray);"></i>
        </div>
    </div>

    <div class="section-wrapper">
        <div class="movies-grid" id="searchResultsGrid">
            </div>
    </div>

    <script src="js/search.js?v=1.3"></script>
</body>
</html>
