<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Film - D4FILMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header id="navbar" class="scrolled">
        <a href="index.html" class="logo">D4<span>FILMS</span></a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Movies</a>
            <a href="watchlist.html">Watchlist</a>
        </nav>
        <div class="nav-right">
            <a href="search.html" class="search-trigger"><i class="fas fa-search"></i></a>
        </div>
    </header>

    <div class="movie-details-hero" id="detailsHero">
        <div class="hero-overlay"></div>
        <div class="details-container">
            <img id="moviePoster" class="details-poster" src="" alt="">
            <div class="details-info">
                <h1 id="movieTitle" class="details-title"></h1>
                <div class="hero-meta" id="movieMeta"></div>
                <p id="movieOverview" class="hero-overview"></p>
                <div class="btn-group">
                    <button class="btn btn-primary" id="watchBtn"><i class="fas fa-play"></i> WATCH NOW</button>
                    <button class="btn btn-secondary" id="watchlistBtn"><i class="fas fa-plus"></i> Add to List</button>
                </div>
            </div>
        </div>
    </div>

    <section class="player-wrapper" id="playerSection">
        <div class="video-container">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>
        <div style="margin-top: 1.5rem; text-align: center;">
            <button class="btn btn-secondary" id="downloadBtn" style="display: inline-flex; width: auto;"><i class="fas fa-download"></i> PREMIUM DOWNLOAD (1080p / 4K)</button>
        </div>
    </section>

    <main>
        <h2 class="section-title">Similar Recommendations</h2>
        <div class="movie-grid" id="similarGrid"></div>
    </main>

    <script src="js/script.js"></script>
    <script src="js/movie.js"></script>
</body>
</html>
