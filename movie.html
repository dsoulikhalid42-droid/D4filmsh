<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Movie - D4FILMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.2">
</head>
<body class="movie-page-body">

    <!-- الهيدر ثابت -->
    <header>
        <a href="index.html" class="logo">D4<span>FILMS</span></a>
        <div class="nav-actions">
            <i class="fa-solid fa-magnifying-glass" onclick="window.location.href='search.html'"></i>
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <!-- حاوية المشغل -->
    <div class="player-container">
        <div class="video-player-wrapper">
            <!-- غيتعمر الـ iframe هنا بـ السكريبت تلقائياً بـ API ديال vidsrc أو الفلم المختار -->
            <div id="playerPlaceholder" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--text-gray);">Loading Player...</div>
        </div>
    </div>

    <!-- أزرار الأكشن التحت المشغل -->
    <div class="player-buttons">
        <button class="btn-player-action"><i class="fa-solid fa-play"></i> Watch Now</button>
        <button class="btn-player-action"><i class="fa-solid fa-download"></i> Download</button>
    </div>

    <!-- تفاصيل ومعلومات الفيلم -->
    <div class="movie-details-info" id="movieDetailsContainer">
        <!-- كيتعمر بـ الـ JS -->
    </div>

    <!-- سيكشن الأفلام المقترحة مستفة عمودياً بحال الصورة 28111.jpg -->
    <div class="section-wrapper" style="padding: 0 5%;">
        <div class="section-header" style="margin-bottom: 10px;">
            <i class="fa-solid fa-square-play" style="color:var(--primary-cyan)"></i>
            <h2 class="section-title" style="font-size:18px;">RECOMMENDED</h2>
        </div>
    </div>
    
    <div class="rec-list-container" id="recommendedList">
        <!-- كيتعمر بـ الأسطر والافلام المقترحة هنا بـ الـ JS -->
    </div>

    <script src="js/movie.js?v=1.2"></script>
</body>
</html>
