<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch - D4FILMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.4">
</head>
<body class="movie-page-body">

    <header>
        <a href="index.html" class="logo">D4<span>FILMS</span></a>
        <div class="nav-actions">
            <i class="fa-solid fa-house" onclick="window.location.href='index.html'"></i>
        </div>
    </header>

    <div class="player-container">
        <div class="video-player-wrapper">
            <div id="playerPlaceholder">Loading Player...</div>
        </div>
    </div>

    <div class="player-buttons" style="flex-wrap: wrap;">
        <button class="btn-player-action" style="background:var(--primary-cyan); color:#000;"><i class="fa-solid fa-play"></i> Watch Now</button>
        <button class="btn-player-action"><i class="fa-solid fa-download"></i> Download</button>
        
        <div style="width: 100%; display: flex; justify-content: center; gap: 10px; margin-top: 10px;">
            <span class="badge-outline" id="srv1" style="cursor:pointer; padding: 5px 12px;" onclick="switchServerLink(1)">Server 1</span>
            <span class="badge-outline" id="srv2" style="cursor:pointer; padding: 5px 12px;" onclick="switchServerLink(2)">Server 2</span>
        </div>
    </div>

    <div id="tvSelectorContainer" class="section-wrapper" style="display:none; background:#1f2833; padding:15px; border-radius:8px; margin: 15px 5%;">
        <div style="display:flex; gap:10px; margin-bottom:12px;">
            <select id="seasonSelect" style="flex:1; padding:8px; background:#0b0c10; color:#fff; border:1px solid #455a64; border-radius:4px; outline:none;"></select>
        </div>
        <div id="episodesGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap:8px;">
            </div>
    </div>

    <div class="movie-details-info" id="movieDetailsContainer"></div>

    <div class="section-wrapper" style="padding: 0 5%;"><h2 class="section-title" style="font-size:16px;">RECOMMENDED</h2></div>
    <div class="rec-list-container" id="recommendedList"></div>

    <script src="js/movie.js?v=1.4"></script>
</body>
</html>
