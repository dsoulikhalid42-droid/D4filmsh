<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4film - المشاهدة المباشرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="movie-page-body">

    <header>
        <a href="index.html" class="logo">D4<span>film</span></a>
        <div class="nav-actions">
            <a href="index.html" style="color: #fff;"><i class="fas fa-home"></i></a>
        </div>
    </header>

    <main class="player-container">
        
        <div class="video-player-wrapper">
            <div style="color:var(--text-gray); padding: 20px; text-align: center;">جاري تجهيز السيرفر...</div>
        </div>

        <div class="player-buttons">
            <button id="server1Btn" class="btn-player-action" style="border-color: var(--primary-cyan); color: var(--primary-cyan);">
                <i class="fas fa-server"></i> Server 1
            </button>
            <button id="server2Btn" class="btn-player-action">
                <i class="fas fa-server"></i> Server 2
            </button>
        </div>

        <div id="tvSelectorContainer" style="display: none;">
            <select id="seasonSelect">
                </select>
            <div id="episodesGrid">
                </div>
        </div>

        <div class="movie-details-info">
            <h1 id="movieTitle" class="movie-main-title">جاري التحميل...</h1>
            
            <div class="movie-sub-meta">
                <strong>السنة:</strong> <span id="movieYear">-</span>
            </div>
            <div class="movie-sub-meta">
                <strong>التقييم:</strong> <span id="movieRating">-</span> <i class="fas fa-star" style="color:#ffb703; font-size:12px;"></i>
            </div>
            <div class="movie-sub-meta">
                <strong>النوع:</strong> <span id="movieGenres">-</span>
            </div>

            <p id="movieOverview" class="movie-story">
                جاري جلب القصة والتفاصيل من الخادم...
            </p>
        </div>

        <div class="section-wrapper" style="margin-top: 30px; padding: 0;">
            <div class="section-header">
                <i class="fas fa-layer-group section-icon"></i>
                <h2 class="section-title">عناوين مقترحة لك</h2>
            </div>
            <div id="recommendationsContainer" class="rec-list-container" style="padding: 0;">
                </div>
        </div>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
