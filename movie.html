<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Movie - D4FILMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fa-solid fa-arrow-left menu-toggle" onclick="window.location.href='index.html'"></i>
            <div class="logo-box">D4FILMS</div>
        </div>
        <a href="search.html" class="search-trigger"><i class="fa-solid fa-magnifying-glass"></i></a>
    </header>

    <div class="player-container" id="streamContainer">
        <div class="responsive-iframe">
            <iframe id="embedFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="details-main-poster" id="posterArea">
        <img id="mainPosterImg" src="" alt="Poster">
        <i class="fa-solid fa-circle-play center-play-trigger" id="centerPlay"></i>
    </div>

    <div class="action-row">
        <button class="btn-outline-action" id="watchAction"><i class="fa-solid fa-circle-play"></i> Watch Now</button>
        <button class="btn-outline-action" id="downloadAction"><i class="fa-solid fa-download"></i> Download</button>
    </div>

    <div class="info-block">
        <h1 id="detailTitle" style="font-size:1.8rem; margin-bottom:10px;"></h1>
        <div class="hero-meta-row" id="detailMeta" style="justify-content:flex-start; margin-bottom:15px;"></div>
        <p class="info-desc" id="detailOverview"></p>
        <div id="specsBlock"></div>
    </div>

    <h2 class="section-headline"><i class="fa-solid fa-bookmark"></i> Recommended</h2>
    <div class="movie-grid" id="detailRecommended"></div>

    <script src="js/script.js"></script>
    <script src="js/movie.js"></script>
</body>
</html>
